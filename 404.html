<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page non trouvée</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #020617;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .box {
      max-width: 500px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      color: rgba(255,255,255,0.7);
      margin-bottom: 20px;
    }
    a {
      display: inline-block;
      padding: 12px 20px;
      background: white;
      color: #020617;
      border-radius: 10px;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>Cette page n'existe pas.</p>
    <a href="/">Retour au site</a>
  </div>
</body>
</html>
